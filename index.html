<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">My Portfolio</div>
            <ul class="nav-links">
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="projects" class="projects-section">
            <h1>My Projects</h1>
            <div class="project-grid">
                <div class="project-card" onclick="openProject(1)">
                    <img src="project1-cover.jpg" alt="Project 1 Cover">
                    <h3>Project 1</h3>
                    <p>A brief description of Project 1.</p>
                </div>
                <div class="project-card" onclick="openProject(2)">
                    <img src="project2-cover.jpg" alt="Project 2 Cover">
                    <h3>Project 2</h3>
                    <p>A brief description of Project 2.</p>
                </div>
           

                
                <!-- Additional project cards as needed -->
            </div>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit">Send</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 [Your Name]. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
